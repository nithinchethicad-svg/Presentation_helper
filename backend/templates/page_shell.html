<div class="page">
  <!-- Dynamic background vector decorations (toggled/styled by Theme CSS) -->
  <div class="page-decorations">
    <!-- Spiral notebook binder (Educational & Informative) -->
    <div class="decor-spiral-binder"></div>

    <!-- Top-Right Decorative Vector Group -->
    <svg class="decor-top-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Organic soft cozy blob -->
      <path class="decor-blob" d="M110,10 C140,15 175,30 185,60 C195,90 175,130 150,155 C125,180 85,190 55,170 C25,150 15,110 25,75 C35,40 80,5 110,10 Z" />
      
      <!-- Retro Pop Starburst & Concentric Circles -->
      <g class="decor-star">
        <circle cx="120" cy="80" r="60" class="decor-star-circle" />
        <path d="M120,10 L134,50 L174,40 L154,80 L194,100 L154,120 L174,160 L134,150 L120,190 L106,150 L66,160 L86,120 L46,100 L86,80 L66,40 L106,50 Z" />
        <line x1="120" y1="0" x2="120" y2="200" class="decor-star-cross" />
        <line x1="20" y1="100" x2="220" y2="100" class="decor-star-cross" />
      </g>
      
      <!-- High-Tech HUD Corner Bracket -->
      <g class="decor-hud">
        <polygon points="200,0 120,0 200,80" class="decor-polygon-1" />
        <polygon points="200,0 70,0 200,130" class="decor-polygon-2" />
        <path d="M 100,10 L 190,10 L 190,100 M 110,20 L 180,20 L 180,90" class="decor-hud-bracket" />
        <circle cx="160" cy="40" r="6" class="decor-hud-dot" />
      </g>

      <!-- Curly Plant Stem with Leaves (Reflective & Thoughtful) -->
      <path class="decor-flourish" d="M 200,0 C 160,20 120,50 100,90 C 90,110 85,130 90,150 C 95,170 110,185 130,180 C 145,175 150,160 145,145 C 135,125 110,120 95,135 M 150,40 C 135,35 120,45 120,60 C 120,75 140,80 150,70 C 155,65 155,45 150,40 M 110,75 C 95,70 85,85 90,100 C 95,110 110,110 115,95 C 115,85 110,75 110,75 M 85,125 C 70,120 65,135 70,150 C 75,160 90,155 90,140 C 90,130 85,125 85,125" />
    </svg>

    <!-- Bottom-Left Decorative Vector Group -->
    <svg class="decor-bottom-left" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Organic soft cozy blob -->
      <path class="decor-blob" d="M100,20 C130,10 165,25 175,55 C185,85 165,125 140,150 C115,175 75,185 45,165 C15,145 5,105 15,70 C25,35 70,30 100,20 Z" />
      
      <!-- Retro Pop Starburst & Concentric Circles -->
      <g class="decor-star">
        <circle cx="80" cy="120" r="60" class="decor-star-circle" />
        <path d="M80,10 L94,50 L134,40 L114,80 L154,100 L114,120 L134,160 L94,150 L80,190 L66,150 L26,160 L46,120 L6,100 L46,80 L26,40 L66,50 Z" />
        <line x1="80" y1="0" x2="80" y2="200" class="decor-star-cross" />
        <line x1="-20" y1="120" x2="180" y2="120" class="decor-star-cross" />
      </g>
      
      <!-- High-Tech HUD Corner Bracket -->
      <g class="decor-hud">
        <polygon points="0,200 80,200 0,120" class="decor-polygon-1" />
        <polygon points="0,200 130,200 0,70" class="decor-polygon-2" />
        <path d="M 10,190 L 10,100 L 100,190 M 20,180 L 20,110 L 90,180" class="decor-hud-bracket" />
        <circle cx="40" cy="160" r="6" class="decor-hud-dot" />
      </g>

      <!-- Curly Plant Stem with Leaves (Reflective & Thoughtful) -->
      <path class="decor-flourish" d="M 0,200 C 40,180 80,150 100,110 C 110,90 115,70 110,50 C 105,30 90,15 70,20 C 55,25 50,40 55,55 C 65,75 90,80 105,65 M 50,160 C 65,165 80,155 80,140 C 80,125 60,120 50,130 C 45,135 45,155 50,160 M 90,125 C 105,130 115,115 110,100 C 105,90 90,90 85,105 C 85,115 90,125 90,125 M 115,75 C 130,80 135,65 130,50 C 125,40 110,45 110,60 C 110,70 115,75 115,75" />
    </svg>

    <!-- AI-Generated SVG: Top-Right Corner (populated by htmlCompiler from templates/svgs/<theme>/corner_top_right.svg) -->
    <div class="decor-ai-corner-tr">{{AI_SVG_CORNER_TR}}</div>

    <!-- AI-Generated SVG: Bottom-Left Corner (populated by htmlCompiler from templates/svgs/<theme>/corner_bottom_left.svg) -->
    <div class="decor-ai-corner-bl">{{AI_SVG_CORNER_BL}}</div>

    <!-- AI-Generated SVG: Repeating Border/Frame Ornament (populated by htmlCompiler from templates/svgs/<theme>/border_ornament.svg) -->
    <div class="decor-ai-border">{{AI_SVG_BORDER}}</div>

    <!-- AI-Generated SVG: Margin Accent Strip (populated by htmlCompiler from templates/svgs/<theme>/margin_accent.svg) -->
    <div class="decor-ai-margin">{{AI_SVG_MARGIN}}</div>

    <!-- AI-Generated SVG: Full-Page Background Pattern (populated by htmlCompiler from templates/svgs/<theme>/bg_pattern.svg) -->
    <div class="decor-ai-bg-pattern">{{AI_SVG_BG_PATTERN}}</div>
  </div>

  <!-- Top margin accent flourish -->
  <div class="margin-accent"></div>

  <!-- Global Page Header -->
  <div class="page-header">
    <h2 class="page-title">{{pageTitle}}</h2>
    <span class="page-subtitle">Takeaway Notes</span>
  </div>

  <!-- Dynamic Section Blocks Stack -->
  <div class="page-content">
    {{sectionsContent}}
  </div>

  <!-- Global Page Footer -->
  <div class="page-footer">
    <span class="page-footer-left">Takeaway Notes</span>
    <span class="page-number">Page {{PAGE_NUM}} of {{TOTAL_PAGES}}</span>
  </div>
  
  <!-- Bottom margin accent flourish -->
  <div class="margin-accent-bottom"></div>
</div>
