<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Grid lines (blueprint style) -->
  <line x1="20" y1="0" x2="20" y2="180" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="60" y1="0" x2="60" y2="140" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="100" y1="0" x2="100" y2="100" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="140" y1="0" x2="140" y2="60" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="200" y1="20" x2="20" y2="20" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="200" y1="60" x2="60" y2="60" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="200" y1="100" x2="100" y2="100" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="200" y1="140" x2="140" y2="140" stroke="currentColor" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Concentric compass arcs -->
  <path d="M 60,0 A 140,140 0 0,0 200,140" fill="none" stroke="currentColor" stroke-width="1.5" stroke-opacity="0.8"/>
  <path d="M 100,0 A 100,100 0 0,0 200,100" fill="none" stroke="currentColor" stroke-width="3" stroke-opacity="0.85"/>
  <path d="M 130,0 A 70,70 0 0,0 200,70" fill="none" stroke="currentColor" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.6"/>
  <!-- Hexagon / geometric shape -->
  <polygon points="200,0 150,0 175,43" fill="currentColor" fill-opacity="0.85"/>
  <circle cx="175" cy="43" r="5" fill="currentColor" fill-opacity="0.95"/>
</svg>
