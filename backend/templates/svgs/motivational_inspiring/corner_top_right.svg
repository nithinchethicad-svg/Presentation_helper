<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <!-- Steep climbing geometric mountain peaks -->
  <polygon points="200,0 200,160 140,80 80,140 0,40 0,0" fill="currentColor" fill-opacity="0.35"/>
  <polygon points="200,0 200,100 150,50 110,90 60,30 60,0" fill="currentColor" fill-opacity="0.55"/>
  <polygon points="200,0 200,40 180,20 160,40 120,0" fill="currentColor" fill-opacity="0.75"/>
  <!-- Golden dynamic ray lines -->
  <line x1="0" y1="0" x2="200" y2="200" stroke="currentColor" stroke-width="2.5" stroke-opacity="0.9"/>
  <line x1="0" y1="0" x2="160" y2="200" stroke="currentColor" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="0" y1="0" x2="200" y2="160" stroke="currentColor" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Shining stars at peaks -->
  <polygon points="140,65 142,70 147,72 142,74 140,79 138,74 133,72 138,70" fill="currentColor" fill-opacity="0.95"/>
  <polygon points="80,125 81,128 84,129 81,130 80,133 79,130 76,129 79,128" fill="currentColor" fill-opacity="0.95"/>
</svg>
